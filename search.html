<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Classes</title>
  <link rel="stylesheet" href="search.css" />
</head>
<body>
  <header class="top-bar">
    <a class="back-link" href="index.html">←</a>
    <h1>Search Criteria</h1>
    <p class="semester">Semester: Spring 2026</p>
  </header>

  <main class="search-page">
    <section class="criteria-card">
      <label for="termSelect">Term</label>
      <select id="termSelect">
        <option value="">Select a term</option>
        <option>Spring 2026</option>
        <option>Fall 2026</option>
      </select>

      <label for="subjectSelect">Subject</label>
      <select id="subjectSelect">
        <option value="">Select a subject</option>
        <option>Computer Science</option>
        <option>Mathematics</option>
        <option>Statistics</option>
        <option>English</option>
        <option>French</option>
        <option>Engineering</option>
        <option>Psychology</option>
        <option>Japanese</option>
        <option>Communications</option>
        <option>Biology</option>
        <option>Chemistry</option>
        <option>Physics</option>
        <option>Economics</option>
        <option>Sociology</option>
        <option>History</option>
        <option>Political Science</option>
        <option>Philosophy</option>
        <option>Business Administration</option>
        <option>Nursing</option>
        <option>Art History</option>
      </select>

      <label for="courseNumber">Course Number</label>
      <input id="courseNumber" placeholder="Enter course number (ex: 3745)" />

      <button id="moreCriteriaButton" class="outline-button" type="button">Additional Criteria</button>

      <div class="extra-criteria" aria-label="Additional criteria options">
        <label><input type="checkbox" disabled /> Morning classes only</label>
        <label><input type="checkbox" disabled /> Evening classes only</label>
        <label><input type="checkbox" disabled /> Open seats only</label>
        <label><input type="checkbox" disabled /> Online / hybrid option</label>
        <label><input type="checkbox" disabled /> Meets major requirement</label>

        <label for="creditPref">Preferred Credits</label>
        <select id="creditPref" disabled>
          <option>Any credit load</option>
          <option>1-2 credits</option>
          <option>3 credits</option>
          <option>4+ credits</option>
        </select>

        <label for="instructorPref">Preferred Instructor</label>
        <input id="instructorPref" placeholder="Ex: Prof. Chen" disabled />
      </div>

    </section>

    <section class="bottom-actions">
      <button id="clearButton" class="outline-button" type="button">Clear</button>
      <button id="searchButton" class="primary-button" type="button">Search</button>
    </section>
  </main>

  <script src="search.js"></script>
</body>
</html>
