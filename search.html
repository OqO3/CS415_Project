<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Classes</title>
  <link rel="stylesheet" href="search.css" />
</head>
<body>
  <header class="top-bar">
    <a class="back-link" href="index.html">←</a>
    <h1>Search Criteria</h1>
    <p class="semester">Semester: Spring 2026</p>
  </header>

  <main class="search-page">
    <section class="criteria-card">
      <label for="termSelect">Term</label>
      <select id="termSelect">
        <option value="">Select a term</option>
        <option>Spring 2026</option>
        <option>Fall 2026</option>
      </select>

      <label for="subjectInput">Subject</label>
      <div class="subject-autocomplete">
        <input id="subjectInput" placeholder="Type or select a subject" autocomplete="off" />
        <div id="subjectSuggestions" class="subject-suggestions" hidden></div>
      </div>

      <label for="courseNumber">Course Number</label>
      <input id="courseNumber" placeholder="Enter course number (ex: 3745)" />

      <button id="moreCriteriaButton" class="outline-button" type="button">Additional Criteria</button>

      <div class="extra-criteria" aria-label="Additional criteria options">
        <label><input id="morningOnly" type="checkbox" /> Morning classes only</label>
        <label><input id="eveningOnly" type="checkbox" /> Evening classes only</label>
        <label><input id="openSeatsOnly" type="checkbox" /> Open seats only</label>
        <label><input id="onlineOnly" type="checkbox" /> Online / hybrid option</label>
        <label><input id="majorReqOnly" type="checkbox" /> Meets major requirement</label>
      </div>

    </section>

    <section class="bottom-actions">
      <button id="clearButton" class="outline-button" type="button">Clear</button>
      <button id="searchButton" class="primary-button" type="button">Search</button>
    </section>
  </main>

  <script src="search.js"></script>
</body>
</html>
