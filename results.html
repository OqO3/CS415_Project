<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Results</title>
  <link rel="stylesheet" href="results.css" />
</head>
<body>
  <main class="results-page">
    <a class="back-link" href="search.html">← Back</a>
    <h1>Search Results</h1>

    <section class="legend-card">
      <p><span class="dot green"></span>Class meets requirements</p>
      <p><span class="dot red"></span>Class does not fulfill requirements</p>
      <p><span class="dot orange"></span>Class completed</p>
    </section>

    <section id="chipRow" class="chip-row"></section>
    <section id="resultsList" class="results-list"></section>

    <section class="bottom-actions">
      <a class="outline-button" href="search.html">Modify Search</a>
      <button class="primary-button" type="button" onclick="alert('Mock: schedule shown!')">Show Schedule</button>
    </section>
  </main>

  <script src="results.js"></script>
</body>
</html>
